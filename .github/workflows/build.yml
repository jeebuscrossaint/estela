name: Build ESTELA

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
          - platform: macos-latest
            rust-target: x86_64-apple-darwin
          - platform: macos-latest
            rust-target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install pandoc (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          VER=$(curl -fsSL https://api.github.com/repos/jgm/pandoc/releases/latest | jq -r '.tag_name')
          curl -fsSL "https://github.com/jgm/pandoc/releases/download/${VER}/pandoc-${VER}-linux-amd64.tar.gz" -o pandoc.tar.gz
          tar xzf pandoc.tar.gz
          mkdir -p src-tauri/binaries
          mv "pandoc-${VER}/bin/pandoc" "src-tauri/binaries/pandoc-x86_64-unknown-linux-gnu"

      - name: Install pandoc (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ver = (Invoke-RestMethod "https://api.github.com/repos/jgm/pandoc/releases/latest").tag_name
          Invoke-WebRequest "https://github.com/jgm/pandoc/releases/download/$ver/pandoc-$ver-windows-x86_64.zip" -OutFile pandoc.zip
          Expand-Archive pandoc.zip -DestinationPath pandoc-tmp
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Copy-Item "pandoc-tmp/pandoc-$ver/pandoc.exe" "src-tauri/binaries/pandoc-x86_64-pc-windows-msvc.exe"

      - name: Install pandoc (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install pandoc
          mkdir -p src-tauri/binaries
          # Note: on arm64 runners building x86_64 target, this bundles an arm64 pandoc.
          # System pandoc is used as fallback at runtime on Intel Macs.
          cp "$(brew --prefix)/bin/pandoc" "src-tauri/binaries/pandoc-${{ matrix.rust-target }}"

      - name: Install Node + Tauri CLI
        run: npm install

      - name: Build Tauri app
        # Skip DMG creation on macOS — hdiutil is unreliable in CI with large bundles.
        # The .app is uploaded directly instead.
        run: |
          if [ "${{ matrix.platform }}" = "macos-latest" ]; then
            npx tauri build --target ${{ matrix.rust-target }} --bundles app
          else
            npx tauri build --target ${{ matrix.rust-target }}
          fi
        shell: bash

      - name: Zip macOS app bundle
        if: matrix.platform == 'macos-latest' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          ARCH=$(echo "${{ matrix.rust-target }}" | cut -d- -f1)
          cd "src-tauri/target/${{ matrix.rust-target }}/release/bundle/macos"
          zip -r "../ESTELA-Exam-Builder-${ARCH}-macOS.zip" "ESTELA Exam Builder.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: estela-${{ matrix.rust-target }}
          path: src-tauri/target/${{ matrix.rust-target }}/release/bundle/
          if-no-files-found: warn

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/macos/*.zip
