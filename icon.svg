<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#1a1a2e"/>

  <!-- Atom nucleus -->
  <circle cx="256" cy="256" r="28" fill="#e94560"/>

  <!-- Electron orbit 1 (horizontal ellipse) -->
  <ellipse cx="256" cy="256" rx="140" ry="52"
    fill="none" stroke="#4fc3f7" stroke-width="5" opacity="0.9"/>

  <!-- Electron orbit 2 (rotated 60°) -->
  <ellipse cx="256" cy="256" rx="140" ry="52"
    fill="none" stroke="#4fc3f7" stroke-width="5" opacity="0.9"
    transform="rotate(60 256 256)"/>

  <!-- Electron orbit 3 (rotated 120°) -->
  <ellipse cx="256" cy="256" rx="140" ry="52"
    fill="none" stroke="#4fc3f7" stroke-width="5" opacity="0.9"
    transform="rotate(120 256 256)"/>

  <!-- Electrons on orbits -->
  <circle cx="396" cy="256" r="11" fill="#ffffff"/>
  <circle cx="186" cy="168" r="11" fill="#ffffff" transform="rotate(60 256 256)"/>
  <circle cx="186" cy="344" r="11" fill="#ffffff" transform="rotate(120 256 256)"/>

  <!-- Sine wave at bottom -->
  <path d="M 80 420 Q 120 390 160 420 Q 200 450 240 420 Q 280 390 320 420 Q 360 450 400 420 Q 430 400 432 420"
    fill="none" stroke="#ffd700" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
</svg>
